#---------------------------------------------------------------------
# ECOTRACK - Configuration HAProxy Load Balancer
#---------------------------------------------------------------------
global
    log stdout format raw local0 info
    maxconn 50000
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  50s
    timeout server  50s
    retries 3

#---------------------------------------------------------------------
# STATS - Interface de monitoring HAProxy
#---------------------------------------------------------------------
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 30s
    stats auth admin:EcoTrack2026!
    stats show-legends
    stats show-node

#---------------------------------------------------------------------
# FRONTEND - Point d'entrée HTTP
#---------------------------------------------------------------------
frontend ecotrack_frontend
    bind *:8080
    default_backend ecotrack_api_backend

    # ACL pour l'API
    acl is_api path_beg /api/
    acl is_health path_beg /health

    use_backend ecotrack_api_backend if is_api
    use_backend ecotrack_api_backend if is_health

#---------------------------------------------------------------------
# BACKEND - API ECOTRACK (Load Balancing)
#---------------------------------------------------------------------
backend ecotrack_api_backend
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200

    server api1 eco-api:3000 check inter 5s rise 2 fall 3
