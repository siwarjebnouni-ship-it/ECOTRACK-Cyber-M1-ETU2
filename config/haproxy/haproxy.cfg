global 
    log stdout format raw local0 
    maxconn 50000 
 
defaults 
    log global 
    mode http 
    timeout connect 5s 
    timeout client 30s 
    timeout server 30s 
    option forwardfor 
 
frontend stats 
    bind *:8404 
    stats enable 
    stats uri /stats 
    stats refresh 10s 
    stats auth admin:EcoTrack2026! 
 
frontend ecotrack_frontend 
    bind *:8080 
    default_backend ecotrack_api_backend 
 
backend ecotrack_api_backend 
    balance roundrobin 
    option httpchk GET /health 
    server api1 172.20.2.4:3000 check inter 10s
