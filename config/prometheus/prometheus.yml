global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node-exporter
    static_configs:
      - targets: ['eco-node-exporter:9100']

  - job_name: grafana
    static_configs:
      - targets: ['eco-grafana:3000']

  - job_name: postgresql
    static_configs:
      - targets: ['eco-postgresql:9187']