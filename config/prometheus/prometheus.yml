global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ecotrack-monitor'
    environment: 'production'

rule_files:
  - "alerts.yml"
  - "rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - eco-alertmanager:9093

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['eco-node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['eco-cadvisor:8080']

  - job_name: 'postgresql'
    static_configs:
      - targets: ['eco-postgres-exporter:9187']

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['eco-alertmanager:9093']

  - job_name: 'grafana'
    static_configs:
      - targets: ['eco-grafana:3000']
