server_tokens off;
server{listen 80 default_server;server_name _;return 301 https://\$host\$request_uri;}
server{listen 443 ssl;server_name ecotrack.fr;ssl_certificate /etc/nginx/conf/server.crt;ssl_certificate_key /etc/nginx/conf/server.key;ssl_protocols TLSv1.2 TLSv1.3;ssl_prefer_server_ciphers off;location /{root /etc/nginx/conf.d/html;index index.html;}location /api/{proxy_pass http://172.20.2.4:3000/api/;proxy_set_header Host \$host;}}
server{listen 443 ssl;server_name grafana.ecotrack.fr;ssl_certificate /etc/nginx/conf/server.crt;ssl_certificate_key /etc/nginx/conf/server.key;ssl_protocols TLSv1.2 TLSv1.3;ssl_prefer_server_ciphers off;location /{proxy_pass http://172.20.4.3:3000/;proxy_set_header Host \$host;proxy_set_header X-Real-IP \$remote_addr;}}
